<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment App Prototypes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #FAFAF7;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      color: #1a1a1a;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      height: 100vh;
      background: white;
      border-right: 1px solid #F0ECF5;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid #F0ECF5;
    }
    .sidebar-header h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
    }
    .sidebar-header p {
      font-size: 12px;
      color: #9CA3AF;
      margin-top: 4px;
    }
    .sidebar-nav {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      transition: background 0.15s;
    }
    .nav-item:hover {
      background: #F8F6FB;
    }
    .nav-item.active {
      background: #F3E8FF;
    }
    .nav-item-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .nav-item-text {
      flex: 1;
      min-width: 0;
    }
    .nav-item-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-item.active .nav-item-title {
      color: #6B21A8;
    }
    .nav-item-tag {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 2px;
    }
    .nav-item.active .nav-item-tag {
      color: #8B7A9E;
    }

    /* Main content area */
    .main {
      flex: 1;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F0ECF5;
    }
    .main iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Welcome state when nothing selected */
    .welcome {
      text-align: center;
      padding: 40px;
    }
    .welcome-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .welcome h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 24px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 14px;
      color: #9CA3AF;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Investment App Prototypes</h1>
      <p>Select a prototype to preview</p>
    </div>
    <nav class="sidebar-nav" id="nav"></nav>
  </div>

  <div class="main" id="main">
    <div class="welcome">
      <div class="welcome-icon">👈</div>
      <h2>Pick a prototype</h2>
      <p>Select one from the sidebar to get started.</p>
    </div>
  </div>

  <script>
    const prototypes = [
      {
        id: 'impact-report',
        title: 'Impact Report',
        tag: 'Mobile UI',
        icon: '📊',
        iconBg: 'linear-gradient(135deg, #F3E8FF, #E9D5FF)',
        src: 'prototypes/impact-report/index.html',
      },
      {
        id: 'product-simulator',
        title: 'Product Simulator',
        tag: 'Mobile UI',
        icon: '🧮',
        iconBg: 'linear-gradient(135deg, #ECFDF5, #D1FAE5)',
        src: 'prototypes/product-simulator/index.html',
      },
      {
        id: 'rm-toolkit',
        title: 'RM Sales Toolkit',
        tag: 'Desktop UI',
        icon: '🤝',
        iconBg: 'linear-gradient(135deg, #FEF3C7, #FDE68A)',
        src: 'prototypes/rm-toolkit/index.html',
      },
      {
        id: 'celengan',
        title: 'Celengan Goals',
        tag: 'Mobile UI',
        icon: '🌱',
        iconBg: 'linear-gradient(135deg, #ECFDF5, #BBF7D0)',
        src: 'prototypes/celengan/index.html',
      },
    ];

    const nav = document.getElementById('nav');
    const main = document.getElementById('main');
    let activeId = null;

    function selectPrototype(id) {
      activeId = id;
      const proto = prototypes.find(p => p.id === id);
      if (!proto) return;

      // Update active state in sidebar
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });

      // Load iframe
      main.innerHTML = `<iframe src="${proto.src}" title="${proto.title}"></iframe>`;
    }

    // Render nav items
    prototypes.forEach(proto => {
      const btn = document.createElement('button');
      btn.className = 'nav-item';
      btn.dataset.id = proto.id;
      btn.innerHTML = `
        <div class="nav-item-icon" style="background: ${proto.iconBg}">${proto.icon}</div>
        <div class="nav-item-text">
          <div class="nav-item-title">${proto.title}</div>
          <div class="nav-item-tag">${proto.tag}</div>
        </div>
      `;
      btn.addEventListener('click', () => selectPrototype(proto.id));
      nav.appendChild(btn);
    });

    // Auto-select first prototype
    if (prototypes.length > 0) {
      selectPrototype(prototypes[0].id);
    }
  </script>
</body>
</html>
