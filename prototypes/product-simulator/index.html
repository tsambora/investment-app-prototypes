<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Simulator</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FAFAF7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const ProductSimulator = () => {
  const [amount, setAmount] = useState(10000000);
  const [frequency, setFrequency] = useState("monthly");
  const [duration, setDuration] = useState(12);
  const [showResults, setShowResults] = useState(false);
  const [selectedTier, setSelectedTier] = useState("dynamic");

  const tiers = {
    dynamic: { name: "Dynamic", rate: 14, color: "#6B21A8", tkb90: 97.2, risk: "Tinggi" },
    progressive: { name: "Progressive", rate: 11, color: "#2563EB", tkb90: 98.1, risk: "Sedang-Tinggi" },
    balanced: { name: "Balanced", rate: 8, color: "#0D9488", tkb90: 98.8, risk: "Sedang" },
    balancedflex: { name: "Balanced - Flex", rate: 6.5, color: "#D97706", tkb90: 99.1, risk: "Rendah-Sedang" },
  };

  const formatRupiah = (num) => "Rp " + Math.round(num).toLocaleString("id-ID");

  const calcReturns = (tierRate) => {
    const monthlyRate = tierRate / 100 / 12;
    let total = 0;
    const monthlyData = [];

    if (frequency === "once") {
      total = amount;
      for (let m = 1; m <= duration; m++) {
        total += total * monthlyRate;
        monthlyData.push(total);
      }
    } else {
      for (let m = 1; m <= duration; m++) {
        total += amount;
        total += total * monthlyRate;
        monthlyData.push(total);
      }
    }

    const totalInvested = frequency === "once" ? amount : amount * duration;
    const totalEarnings = total - totalInvested;
    const monthlyEarning = totalEarnings / duration;

    return { total, totalInvested, totalEarnings, monthlyEarning, monthlyData };
  };

  const results = useMemo(() => {
    const r = {};
    Object.keys(tiers).forEach((k) => {
      r[k] = calcReturns(tiers[k].rate);
    });
    return r;
  }, [amount, frequency, duration]);

  const bankResults = useMemo(() => calcReturns(2.5), [amount, frequency, duration]);

  const selected = results[selectedTier];
  const tier = tiers[selectedTier];

  const estimatedMitra = Math.max(1, Math.round(
    (frequency === "once" ? amount : amount * duration) / 1500000
  ));

  const industries = [
    { name: "Perdagangan", pct: 38, icon: "\u{1F3EA}" },
    { name: "Pertanian", pct: 22, icon: "\u{1F33E}" },
    { name: "Peternakan", pct: 18, icon: "\u{1F414}" },
    { name: "Konveksi", pct: 12, icon: "\u{1F9F5}" },
    { name: "Makanan", pct: 10, icon: "\u{1F35C}" },
  ];

  const provinces = [
    { name: "Jawa Barat", pct: 35 },
    { name: "Jawa Tengah", pct: 28 },
    { name: "Jawa Timur", pct: 22 },
    { name: "NTB & Lainnya", pct: 15 },
  ];

  const amountOptions = [1000000, 5000000, 10000000, 25000000, 50000000, 100000000];
  const durationOptions = [3, 6, 12, 24];

  const maxVal = Math.max(...selected.monthlyData);

  const chartW = 310;
  const chartH = 100;
  const points = selected.monthlyData.map((v, i) => ({
    x: (i / (selected.monthlyData.length - 1)) * chartW,
    y: chartH - ((v - selected.totalInvested * (frequency === "once" ? 1 : (i + 1) / duration)) / maxVal) * chartH * 0.6 - chartH * 0.3,
  }));

  const bankPoints = bankResults.monthlyData.map((v, i) => ({
    x: (i / (bankResults.monthlyData.length - 1)) * chartW,
    y: chartH - ((v - bankResults.totalInvested * (frequency === "once" ? 1 : (i + 1) / duration)) / maxVal) * chartH * 0.6 - chartH * 0.3,
  }));

  const areaPath = `M0,${chartH} L${points.map((p) => `${p.x},${p.y}`).join(" L")} L${chartW},${chartH} Z`;
  const linePath = `M${points.map((p) => `${p.x},${p.y}`).join(" L")}`;
  const bankLinePath = `M${bankPoints.map((p) => `${p.x},${p.y}`).join(" L")}`;

  return (
    <div
      style={{
        maxWidth: 390,
        margin: "0 auto",
        background: "#FAFAF7",
        minHeight: "100vh",
        fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
        position: "relative",
      }}
    >
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
        rel="stylesheet"
      />

      {/* Status bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 20px 8px", fontSize: 12, fontWeight: 600, color: "#1a1a1a" }}>
        <span>9:41</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="#1a1a1a"><rect x="0" y="8" width="3" height="4" rx="0.5" /><rect x="4.5" y="5" width="3" height="7" rx="0.5" /><rect x="9" y="2" width="3" height="10" rx="0.5" /><rect x="13.5" y="0" width="3" height="12" rx="0.5" opacity="0.3" /></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="#1a1a1a"><path d="M8 3C10.7 3 13.1 4.2 14.7 6.1L16 4.6C14 2.3 11.2 0.8 8 0.8S2 2.3 0 4.6L1.3 6.1C2.9 4.2 5.3 3 8 3Z" /><path d="M8 7C9.7 7 11.2 7.7 12.3 8.9L13.6 7.4C12.1 5.9 10.2 5 8 5S3.9 5.9 2.4 7.4L3.7 8.9C4.8 7.7 6.3 7 8 7Z" /><circle cx="8" cy="11" r="1.5" /></svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="#1a1a1a"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#1a1a1a" strokeWidth="1" fill="none" /><rect x="2" y="3" width="14" height="6" rx="1" fill="#34C759" /><rect x="23" y="4" width="2" height="4" rx="0.5" /></svg>
        </div>
      </div>

      {/* Header */}
      <div style={{ padding: "8px 20px 20px", display: "flex", alignItems: "center", gap: 12 }}>
        <div
          style={{ width: 36, height: 36, borderRadius: 10, background: "#F0ECF5", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}
          onClick={() => setShowResults(false)}
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B21A8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg>
        </div>
        <div>
          <div style={{ fontSize: 11, color: "#8B7A9E", fontWeight: 500, letterSpacing: 0.8, textTransform: "uppercase" }}>
            Simulasi Investasi
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#1a1a1a", fontFamily: "'Fraunces', Georgia, serif" }}>
            {showResults ? "Hasil Simulasi" : "Grassroots Growth Series"}
          </div>
        </div>
      </div>

      <div style={{ overflowY: "auto", paddingBottom: 110 }}>
        {!showResults ? (
          <>
            {/* Amount input */}
            <div style={{ padding: "0 20px", marginBottom: 20 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 6, letterSpacing: 0.3 }}>
                  Berapa yang ingin kamu investasikan?
                </div>
                <div style={{ fontSize: 11, color: "#B0A3C0", marginBottom: 16 }}>
                  {frequency === "once" ? "Investasi satu kali" : "Jumlah per bulan"}
                </div>

                <div style={{
                  background: "linear-gradient(135deg, #F8F6FB 0%, #F0ECF5 100%)",
                  borderRadius: 16,
                  padding: "18px 20px",
                  marginBottom: 16,
                  textAlign: "center",
                }}>
                  <div style={{
                    fontSize: 28,
                    fontWeight: 700,
                    color: "#6B21A8",
                    fontFamily: "'Fraunces', Georgia, serif",
                  }}>
                    {formatRupiah(amount)}
                  </div>
                </div>

                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {amountOptions.map((opt) => (
                    <button
                      key={opt}
                      onClick={() => setAmount(opt)}
                      style={{
                        padding: "8px 14px",
                        borderRadius: 10,
                        border: amount === opt ? "2px solid #6B21A8" : "1.5px solid #E5DEEE",
                        background: amount === opt ? "#F3E8FF" : "white",
                        color: amount === opt ? "#6B21A8" : "#6B7280",
                        fontSize: 13,
                        fontWeight: 600,
                        cursor: "pointer",
                        fontFamily: "'DM Sans', sans-serif",
                      }}
                    >
                      {opt >= 1000000 ? `${opt / 1000000} jt` : `${opt / 1000}rb`}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Frequency */}
            <div style={{ padding: "0 20px", marginBottom: 20 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 14, letterSpacing: 0.3 }}>
                  Seberapa sering?
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  {[
                    { key: "once", label: "Sekali", desc: "Investasi satu kali" },
                    { key: "monthly", label: "Bulanan", desc: "Otomatis setiap bulan" },
                  ].map((opt) => (
                    <button
                      key={opt.key}
                      onClick={() => setFrequency(opt.key)}
                      style={{
                        flex: 1,
                        padding: "16px 14px",
                        borderRadius: 14,
                        border: frequency === opt.key ? "2px solid #6B21A8" : "1.5px solid #E5DEEE",
                        background: frequency === opt.key ? "linear-gradient(135deg, #F8F0FF 0%, #F3E8FF 100%)" : "white",
                        cursor: "pointer",
                        textAlign: "left",
                      }}
                    >
                      <div style={{ fontSize: 15, fontWeight: 600, color: frequency === opt.key ? "#6B21A8" : "#374151", marginBottom: 4, fontFamily: "'DM Sans', sans-serif" }}>
                        {opt.label}
                      </div>
                      <div style={{ fontSize: 11, color: frequency === opt.key ? "#8B5FC7" : "#9CA3AF", fontFamily: "'DM Sans', sans-serif" }}>
                        {opt.desc}
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Duration */}
            <div style={{ padding: "0 20px", marginBottom: 20 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 14, letterSpacing: 0.3 }}>
                  Berapa lama?
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  {durationOptions.map((d) => (
                    <button
                      key={d}
                      onClick={() => setDuration(d)}
                      style={{
                        flex: 1,
                        padding: "14px 8px",
                        borderRadius: 14,
                        border: duration === d ? "2px solid #6B21A8" : "1.5px solid #E5DEEE",
                        background: duration === d ? "linear-gradient(135deg, #F8F0FF 0%, #F3E8FF 100%)" : "white",
                        cursor: "pointer",
                        textAlign: "center",
                      }}
                    >
                      <div style={{ fontSize: 18, fontWeight: 700, color: duration === d ? "#6B21A8" : "#374151", fontFamily: "'Fraunces', Georgia, serif" }}>
                        {d}
                      </div>
                      <div style={{ fontSize: 11, color: duration === d ? "#8B5FC7" : "#9CA3AF", fontFamily: "'DM Sans', sans-serif" }}>
                        bulan
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Quick preview */}
            <div style={{ padding: "0 20px", marginBottom: 20 }}>
              <div style={{
                background: "linear-gradient(145deg, #6B21A8 0%, #7E3FBA 40%, #9B59C4 100%)",
                borderRadius: 20,
                padding: "22px",
                position: "relative",
                overflow: "hidden",
              }}>
                <svg style={{ position: "absolute", top: 0, right: 0, opacity: 0.06 }} width="160" height="160" viewBox="0 0 160 160">
                  <circle cx="120" cy="40" r="70" fill="white" /><circle cx="140" cy="80" r="40" fill="white" />
                </svg>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", fontWeight: 500, marginBottom: 8, letterSpacing: 0.3 }}>
                  Estimasi cepat — Dynamic ({tiers.dynamic.rate}% p.a.)
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                  <div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>Total di akhir periode</div>
                    <div style={{ fontSize: 26, fontWeight: 700, color: "white", fontFamily: "'Fraunces', Georgia, serif" }}>
                      {formatRupiah(results.dynamic.total)}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>Potensi imbal hasil</div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: "#86EFAC" }}>
                      +{formatRupiah(results.dynamic.totalEarnings)}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </>
        ) : (
          <>
            {/* Tier selector tabs */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
                {Object.entries(tiers).map(([key, t]) => (
                  <button
                    key={key}
                    onClick={() => setSelectedTier(key)}
                    style={{
                      padding: "8px 16px",
                      borderRadius: 12,
                      border: selectedTier === key ? `2px solid ${t.color}` : "1.5px solid #E5DEEE",
                      background: selectedTier === key ? (key === "dynamic" ? "#F3E8FF" : key === "progressive" ? "#EFF6FF" : key === "balanced" ? "#F0FDFA" : "#FFFBEB") : "white",
                      color: selectedTier === key ? t.color : "#6B7280",
                      fontSize: 12,
                      fontWeight: 600,
                      cursor: "pointer",
                      whiteSpace: "nowrap",
                      fontFamily: "'DM Sans', sans-serif",
                    }}
                  >
                    {t.name}
                  </button>
                ))}
              </div>
            </div>

            {/* Hero earnings card */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{
                background: `linear-gradient(145deg, ${tier.color} 0%, ${tier.color}CC 100%)`,
                borderRadius: 20,
                padding: "24px 22px",
                position: "relative",
                overflow: "hidden",
              }}>
                <svg style={{ position: "absolute", top: 0, right: 0, opacity: 0.06 }} width="180" height="180" viewBox="0 0 180 180">
                  <circle cx="130" cy="50" r="70" fill="white" /><circle cx="160" cy="90" r="40" fill="white" />
                </svg>

                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", fontWeight: 500, marginBottom: 4 }}>
                  {tier.name} — {tier.rate}% p.a.
                </div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", marginBottom: 16 }}>
                  {formatRupiah(amount)}{frequency === "monthly" ? "/bln" : " sekali"} × {duration} bulan
                </div>

                <div style={{ display: "flex", gap: 20, marginBottom: 16 }}>
                  <div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>Total nilai portfolio</div>
                    <div style={{ fontSize: 26, fontWeight: 700, color: "white", fontFamily: "'Fraunces', Georgia, serif" }}>
                      {formatRupiah(selected.total)}
                    </div>
                  </div>
                </div>

                <div style={{ display: "flex", gap: 16 }}>
                  <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: 12, padding: "10px 16px", flex: 1 }}>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginBottom: 3 }}>Imbal hasil total</div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#86EFAC" }}>+{formatRupiah(selected.totalEarnings)}</div>
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: 12, padding: "10px 16px", flex: 1 }}>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginBottom: 3 }}>Rata-rata per bulan</div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "white" }}>+{formatRupiah(selected.monthlyEarning)}</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Growth chart with bank comparison */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 4, letterSpacing: 0.3 }}>
                  Proyeksi Pertumbuhan
                </div>
                <div style={{ fontSize: 11, color: "#B0A3C0", marginBottom: 16 }}>
                  vs deposito bank 2.5% p.a.
                </div>

                <svg viewBox={`0 0 ${chartW} ${chartH + 10}`} style={{ width: "100%", height: 120 }}>
                  {[0.25, 0.5, 0.75].map((pct, i) => (
                    <line key={i} x1="0" y1={chartH * pct} x2={chartW} y2={chartH * pct} stroke="#F3F0F7" strokeWidth="1" />
                  ))}

                  <defs>
                    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={tier.color} stopOpacity="0.2" />
                      <stop offset="100%" stopColor={tier.color} stopOpacity="0.02" />
                    </linearGradient>
                  </defs>
                  <path d={areaPath} fill="url(#areaGrad)" />
                  <path d={linePath} fill="none" stroke={tier.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

                  <path d={bankLinePath} fill="none" stroke="#D1D5DB" strokeWidth="1.5" strokeDasharray="4,4" strokeLinecap="round" />

                  <circle cx={points[points.length - 1]?.x} cy={points[points.length - 1]?.y} r="4" fill={tier.color} />
                  <circle cx={points[points.length - 1]?.x} cy={points[points.length - 1]?.y} r="7" fill={tier.color} opacity="0.15" />

                  <text x="4" y={chartH + 10} fontSize="10" fill="#9CA3AF" fontFamily="DM Sans">Bln 1</text>
                  <text x={chartW - 30} y={chartH + 10} fontSize="10" fill="#9CA3AF" fontFamily="DM Sans">Bln {duration}</text>
                </svg>

                <div style={{ display: "flex", gap: 20, marginTop: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#6B7280" }}>
                    <div style={{ width: 16, height: 3, borderRadius: 2, background: tier.color }} />
                    {tier.name}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#9CA3AF" }}>
                    <div style={{ width: 16, height: 0, borderTop: "2px dashed #D1D5DB" }} />
                    Deposito bank
                  </div>
                </div>

                <div style={{
                  marginTop: 14,
                  background: "#ECFDF5",
                  borderRadius: 12,
                  padding: "12px 16px",
                  fontSize: 13,
                  color: "#065F46",
                  fontWeight: 500,
                  lineHeight: 1.5,
                }}>
                  Kamu berpotensi mendapat <strong>{formatRupiah(selected.totalEarnings - (bankResults.total - bankResults.totalInvested))}</strong> lebih banyak dibanding deposito bank
                </div>
              </div>
            </div>

            {/* Tier comparison */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 16, letterSpacing: 0.3 }}>
                  Perbandingan Semua Produk
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {Object.entries(tiers).map(([key, t]) => {
                    const r = results[key];
                    const isSelected = key === selectedTier;
                    return (
                      <div
                        key={key}
                        onClick={() => setSelectedTier(key)}
                        style={{
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "space-between",
                          padding: "14px 16px",
                          borderRadius: 14,
                          border: isSelected ? `2px solid ${t.color}` : "1.5px solid #F3F0F7",
                          background: isSelected ? `${t.color}08` : "white",
                          cursor: "pointer",
                        }}
                      >
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <div style={{
                            width: 8, height: 8, borderRadius: "50%",
                            background: t.color,
                            opacity: isSelected ? 1 : 0.4,
                          }} />
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 600, color: isSelected ? t.color : "#374151" }}>
                              {t.name}
                            </div>
                            <div style={{ fontSize: 11, color: "#9CA3AF" }}>
                              {t.rate}% p.a. · {t.risk}
                            </div>
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 14, fontWeight: 700, color: "#059669" }}>
                            +{formatRupiah(r.totalEarnings)}
                          </div>
                          <div style={{ fontSize: 11, color: "#9CA3AF" }}>
                            ~{formatRupiah(r.monthlyEarning)}/bln
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Where your money goes */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 16, letterSpacing: 0.3 }}>
                  Ke Mana Uangmu Mengalir
                </div>

                <div style={{
                  background: "linear-gradient(135deg, #F8F6FB 0%, #F0ECF5 100%)",
                  borderRadius: 14,
                  padding: "16px 18px",
                  marginBottom: 18,
                  display: "flex",
                  alignItems: "center",
                  gap: 14,
                }}>
                  <div style={{ fontSize: 36 }}>{"\u{1F469}\u{1F3FD}"}</div>
                  <div>
                    <div style={{ fontSize: 22, fontWeight: 700, color: "#6B21A8", fontFamily: "'Fraunces', Georgia, serif" }}>
                      ~{estimatedMitra} Ibu Mitra
                    </div>
                    <div style={{ fontSize: 12, color: "#8B7A9E", lineHeight: 1.4 }}>
                      Perkiraan perempuan pengusaha yang akan kamu dukung
                    </div>
                  </div>
                </div>

                <div style={{ fontSize: 12, fontWeight: 600, color: "#6B7280", marginBottom: 12 }}>Sebaran industri</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>
                  {industries.map((ind, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 16, width: 24, textAlign: "center" }}>{ind.icon}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, color: "#374151", fontWeight: 500 }}>{ind.name}</span>
                          <span style={{ fontSize: 12, color: "#6B21A8", fontWeight: 600 }}>{ind.pct}%</span>
                        </div>
                        <div style={{ height: 5, borderRadius: 3, background: "#F3F0F7" }}>
                          <div style={{ height: "100%", width: `${ind.pct}%`, borderRadius: 3, background: `linear-gradient(90deg, ${tier.color}AA, ${tier.color})` }} />
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{ fontSize: 12, fontWeight: 600, color: "#6B7280", marginBottom: 10 }}>Sebaran wilayah</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {provinces.map((p, i) => (
                    <div key={i} style={{
                      background: "#F8F6FB", borderRadius: 10, padding: "8px 14px",
                      fontSize: 12, color: "#6B21A8", fontWeight: 500,
                    }}>
                      {p.name} <strong>{p.pct}%</strong>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Example borrower */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{
                background: "linear-gradient(145deg, #FEF7ED 0%, #FFF8F0 100%)",
                borderRadius: 20,
                padding: "22px",
                border: "1px solid #FDE8CD",
              }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#B45309", marginBottom: 14, letterSpacing: 0.3 }}>
                  {"\u{1F4A1}"} Contoh Penerima Manfaat
                </div>
                <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                  <div style={{
                    width: 52, height: 52, borderRadius: 14,
                    background: "linear-gradient(135deg, #F0E6D3, #E8D5B8)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 26, flexShrink: 0,
                  }}>
                    {"\u{1F469}\u{1F3FD}"}
                  </div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: "#92400E", marginBottom: 2 }}>Ibu Ratna</div>
                    <div style={{ fontSize: 12, color: "#B45309", marginBottom: 8 }}>Pedagang Sayur · Desa Ciomas, Bogor</div>
                    <div style={{ fontSize: 13, color: "#78350F", lineHeight: 1.6, opacity: 0.85 }}>
                      Dengan modal dari Amartha, Ibu Ratna bisa menambah variasi sayuran dan memperluas area jualannya ke pasar tetangga. Penghasilannya naik 40% dalam 6 bulan.
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Risk & safety */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 16, letterSpacing: 0.3 }}>
                  Keamanan & Risiko
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {[
                    { icon: "\u{1F6E1}\uFE0F", label: "TKB90 produk ini", value: `${tier.tkb90}%`, desc: "Tingkat keberhasilan bayar 90 hari", color: "#059669" },
                    { icon: "\u{1F4CA}", label: "Tingkat risiko", value: tier.risk, desc: `Sesuai profil produk ${tier.name}`, color: tier.color },
                    { icon: "\u{1F512}", label: "Proteksi asuransi", value: "Tersedia", desc: "Sebagian besar pinjaman diasuransikan", color: "#2563EB" },
                    { icon: "\u23F1\uFE0F", label: "Penarikan lebih awal", value: "Tersedia", desc: "Bisa ditarik sebelum jatuh tempo", color: "#0D9488" },
                  ].map((item, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                      <div style={{
                        width: 38, height: 38, borderRadius: 11, background: "#F8F6FB",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 18, flexShrink: 0,
                      }}>
                        {item.icon}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                          <span style={{ fontSize: 13, fontWeight: 500, color: "#374151" }}>{item.label}</span>
                          <span style={{ fontSize: 14, fontWeight: 700, color: item.color }}>{item.value}</span>
                        </div>
                        <div style={{ fontSize: 11, color: "#9CA3AF" }}>{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{
                  marginTop: 18, paddingTop: 16, borderTop: "1px solid #F3F0F7",
                }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#6B7280", marginBottom: 8 }}>Skenario konservatif (default rate 5%)</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 13, color: "#6B7280" }}>Estimasi imbal hasil tetap</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: "#B45309" }}>
                      +{formatRupiah(selected.totalEarnings * 0.65)}
                    </span>
                  </div>
                  <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 4 }}>
                    Masih lebih tinggi dari deposito bank
                  </div>
                </div>
              </div>
            </div>
          </>
        )}
      </div>

      {/* Sticky CTA */}
      <div style={{
        position: "fixed",
        bottom: 0,
        left: "50%",
        transform: "translateX(-50%)",
        width: "100%",
        maxWidth: 390,
        padding: "12px 20px 28px",
        background: "linear-gradient(0deg, #FAFAF7 70%, transparent 100%)",
      }}>
        <button
          onClick={() => {
            if (!showResults) setShowResults(true);
          }}
          style={{
            width: "100%",
            padding: "16px 24px",
            borderRadius: 16,
            border: "none",
            background: showResults
              ? `linear-gradient(135deg, ${tier.color} 0%, ${tier.color}DD 100%)`
              : "linear-gradient(135deg, #6B21A8 0%, #7E3FBA 100%)",
            color: "white",
            fontSize: 16,
            fontWeight: 600,
            fontFamily: "'DM Sans', sans-serif",
            cursor: "pointer",
            boxShadow: `0 4px 14px ${tier.color}40`,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            gap: 8,
          }}
        >
          {showResults ? (
            <>
              Mulai Investasi
              <span style={{ fontSize: 13, opacity: 0.8 }}>{tier.name}</span>
            </>
          ) : (
            "Lihat Hasil Simulasi"
          )}
        </button>
      </div>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById("root")).render(<ProductSimulator />);
  </script>
</body>
</html>
