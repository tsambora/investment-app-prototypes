    const monthlyEarning = totalEarnings / duration;

                            +{formatRupiah(r.totalEarnings)}
                          </div>
                          <div style={{ fontSize: 11, color: "#9CA3AF" }}>
                            ~{formatRupiah(r.monthlyEarning)}/bln
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Where your money goes */}

              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>

                  Ke Mana Uangmu Mengalir
                </div>

                <div style={{
                  background: "linear-gradient(135deg, #F8F6FB 0%, #F0ECF5 100%)",
                  borderRadius: 14,
                  padding: "16px 18px",
                  marginBottom: 18,
                  display: "flex",
                  alignItems: "center",
                  gap: 14,
                }}>
                  <div style={{ fontSize: 36 }}>{"\u{1F469}\u{1F3FD}"}</div>
                  <div>
                    <div style={{ fontSize: 22, fontWeight: 700, color: "#6B21A8", fontFamily: "'Fraunces', Georgia, serif" }}>
                      ~{estimatedMitra} Ibu Mitra
                    </div>
                    <div style={{ fontSize: 12, color: "#8B7A9E", lineHeight: 1.4 }}>
                      Perkiraan perempuan pengusaha yang akan kamu dukung
                    </div>
                  </div>
                </div>

                <div style={{ fontSize: 12, fontWeight: 600, color: "#6B7280", marginBottom: 12 }}>Sebaran industri</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>
                  {industries.map((ind, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 16, width: 24, textAlign: "center" }}>{ind.icon}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, color: "#374151", fontWeight: 500 }}>{ind.name}</span>
                          <span style={{ fontSize: 12, color: "#6B21A8", fontWeight: 600 }}>{ind.pct}%</span>
                        </div>
                        <div style={{ height: 5, borderRadius: 3, background: "#F3F0F7" }}>
                          <div style={{ height: "100%", width: `${ind.pct}%`, borderRadius: 3, background: `linear-gradient(90deg, ${tier.color}AA, ${tier.color})` }} />
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{ fontSize: 12, fontWeight: 600, color: "#6B7280", marginBottom: 10 }}>Sebaran wilayah</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {provinces.map((p, i) => (
                    <div key={i} style={{
                      background: "#F8F6FB", borderRadius: 10, padding: "8px 14px",
                      fontSize: 12, color: "#6B21A8", fontWeight: 500,
                    }}>
                      {p.name} <strong>{p.pct}%</strong>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Example borrower */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{
                background: "linear-gradient(145deg, #FEF7ED 0%, #FFF8F0 100%)",
                borderRadius: 20,
                padding: "22px",
                border: "1px solid #FDE8CD",
              }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#B45309", marginBottom: 14, letterSpacing: 0.3 }}>
                  {"\u{1F4A1}"} Contoh Penerima Manfaat
                </div>
                <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                  <div style={{
                    width: 52, height: 52, borderRadius: 14,
                    background: "linear-gradient(135deg, #F0E6D3, #E8D5B8)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 26, flexShrink: 0,
                  }}>
                    {"\u{1F469}\u{1F3FD}"}
                  </div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: "#92400E", marginBottom: 2 }}>Ibu Ratna</div>
                    <div style={{ fontSize: 12, color: "#B45309", marginBottom: 8 }}>Pedagang Sayur · Desa Ciomas, Bogor</div>
                    <div style={{ fontSize: 13, color: "#78350F", lineHeight: 1.6, opacity: 0.85 }}>
                      Dengan modal dari Amartha, Ibu Ratna bisa menambah variasi sayuran dan memperluas area jualannya ke pasar tetangga. Penghasilannya naik 40% dalam 6 bulan.
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Risk & safety */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 16, letterSpacing: 0.3 }}>
                  Keamanan & Risiko
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {[
                    { icon: "\u{1F6E1}\uFE0F", label: "TKB90 produk ini", value: `${tier.tkb90}%`, desc: "Tingkat keberhasilan bayar 90 hari", color: "#059669" },
                    { icon: "\u{1F4CA}", label: "Tingkat risiko", value: tier.risk, desc: `Sesuai profil produk ${tier.name}`, color: tier.color },
                    { icon: "\u{1F512}", label: "Proteksi asuransi", value: "Tersedia", desc: "Sebagian besar pinjaman diasuransikan", color: "#2563EB" },
                    { icon: "\u23F1\uFE0F", label: "Penarikan lebih awal", value: "Tersedia", desc: "Bisa ditarik sebelum jatuh tempo", color: "#0D9488" },
                  ].map((item, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                      <div style={{
                        width: 38, height: 38, borderRadius: 11, background: "#F8F6FB",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 18, flexShrink: 0,
                      }}>
                        {item.icon}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                          <span style={{ fontSize: 13, fontWeight: 500, color: "#374151" }}>{item.label}</span>
                          <span style={{ fontSize: 14, fontWeight: 700, color: item.color }}>{item.value}</span>
                        </div>
                        <div style={{ fontSize: 11, color: "#9CA3AF" }}>{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{
                  marginTop: 18, paddingTop: 16, borderTop: "1px solid #F3F0F7",

                  <div style={{ fontSize: 12, fontWeight: 600, color: "#6B7280", marginBottom: 8 }}>Skenario konservatif (default rate 5%)</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 13, color: "#6B7280" }}>Estimasi imbal hasil tetap</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: "#B45309" }}>
                      +{formatRupiah(selected.totalEarnings * 0.65)}
                    </span>
                  </div>
                  <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 4 }}>
                    Masih lebih tinggi dari deposito bank
                  </div>
                </div>
              </div>
            </div>
          </>
        )}
      </div>

      {/* Sticky CTA */}
      <div style={{
        position: "fixed",
        bottom: 0,
        left: "50%",
        transform: "translateX(-50%)",
        width: "100%",
        maxWidth: 390,
        padding: "12px 20px 28px",
        background: "linear-gradient(0deg, #FAFAF7 70%, transparent 100%)",
      }}>
        <button
          onClick={() => {
            if (!showResults) setShowResults(true);
          }}
          style={{
            width: "100%",
            padding: "16px 24px",
            borderRadius: 16,
            border: "none",
            background: showResults
              ? `linear-gradient(135deg, ${tier.color} 0%, ${tier.color}DD 100%)`
              : "linear-gradient(135deg, #6B21A8 0%, #7E3FBA 100%)",
            color: "white",
            fontSize: 16,
            fontWeight: 600,
            fontFamily: "'DM Sans', sans-serif",
            cursor: "pointer",
            boxShadow: `0 4px 14px ${tier.color}40`,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            gap: 8,
          }}
        >
          {showResults ? (
            <>
              Mulai Investasi
              <span style={{ fontSize: 13, opacity: 0.8 }}>{tier.name}</span>
            </>
          ) : (
            "Lihat Hasil Simulasi"
          )}
        </button>
      </div>
    </div>
  );
};

    /* ───────────────────── APP SHELL ───────────────────── */
    const App = () => {
      const [screen, setScreen] = useState("home");

      return (
        <div style={{ maxWidth: 390, margin: "0 auto", minHeight: "100vh", position: "relative" }}>
          {screen === "home" && <Homepage onOpenGGS={() => setScreen("catalog")} />}
          {screen === "catalog" && <GGSCatalog onOpenSimulator={() => setScreen("simulator")} onBack={() => setScreen("home")} />}
          {screen === "simulator" && <ProductSimulator onBack={() => setScreen("catalog")} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
