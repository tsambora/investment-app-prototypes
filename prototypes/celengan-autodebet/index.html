    { id: 16, catalog: "lebaran", amount: 10000, profit: 122, totalProfit: 500, startDate: "19 Jan 2026", endDate: "19 Jan 2027", month: "Jan 2026", progress: 15 },
    { id: 17, catalog: "lebaran", amount: 10000, profit: 116, totalProfit: 500, startDate: "26 Jan 2026", endDate: "26 Jan 2027", month: "Jan 2026", progress: 13 },
    { id: 18, catalog: "lebaran", amount: 10000, profit: 104, totalProfit: 500, startDate: "2 Feb 2026", endDate: "2 Feb 2027", month: "Feb 2026", progress: 11 },

    { id: 21, catalog: "lebaran", amount: 10000, profit: 86, totalProfit: 500, startDate: "23 Feb 2026", endDate: "23 Feb 2027", month: "Feb 2026", progress: 6 },

  ];

  const formatRp = (n) => "Rp" + Math.round(n).toLocaleString("id-ID");
  const totalAssets = assets.reduce((s, a) => s + a.amount, 0);
  const totalProfit = assets.reduce((s, a) => s + a.profit, 0);
  const periodLabel = (p) => p === "weekly" ? "minggu" : "bulan";
  const periodLabelPer = (p) => p === "weekly" ? "/minggu" : "/bulan";
  const periodsPerYear = (p) => p === "weekly" ? 52 : 12;
  const periodsPerMonth = (p) => p === "weekly" ? 4.33 : 1;
  const totalMonthlyAutodebet = Object.values(autodebets).filter(a => a.active).reduce((s, a) => s + a.amount * periodsPerMonth(a.period), 0);
  const estimasi = Math.round(amount * (5 / 100) * (12 / 12));

  const grouped = {};
  assets.forEach((a) => {
    if (!grouped[a.catalog]) grouped[a.catalog] = [];
    grouped[a.catalog].push(a);
  });

  const catalog = catalogs.find((c) => c.id === selectedCatalog);

  const toggleAutodebet = (catalogId) => {
    setAutodebets(prev => ({
      ...prev,
      [catalogId]: { ...prev[catalogId], active: !prev[catalogId].active }
    }));
  };

  const updateAutoDebet = (catalogId, newAmount, newPeriod) => {
    setAutodebets(prev => ({
      ...prev,
      [catalogId]: { ...prev[catalogId], amount: newAmount, period: newPeriod }
    }));
  };

  return (
    <div style={{ maxWidth: 390, margin: "0 auto", background: "#F5F5F5", minHeight: "100vh", fontFamily: "'Nunito', -apple-system, sans-serif", position: "relative" }}>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

      {/* Status bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 20px 8px", fontSize: 12, fontWeight: 700, color: "#1a1a1a" }}>
        <span>16.43</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="#1a1a1a"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" opacity="0.3"/></svg>

          <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#1a1a1a" strokeWidth="1" fill="none"/><rect x="2" y="3" width="14" height="6" rx="1" fill="#34C759"/><rect x="23" y="4" width="2" height="4" rx="0.5" fill="#1a1a1a"/></svg>
        </div>
      </div>

      {/* Header */}
      <div style={{ background: screen === "home" || screen === "portfolio" ? "#00895E" : "white" }}>

          <button onClick={() => {
            if (screen === "home") return;
            if (screen === "portfolio") setScreen("home");
            else if (screen === "catalog") setScreen("home");
            else if (screen === "autodebet-setup") setScreen("catalog");
            else if (screen === "confirm") { if (mode === "autodebet") setScreen("autodebet-setup"); else setScreen("catalog"); }
          }} style={{ width: 32, height: 32, border: "none", background: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={screen === "home" || screen === "portfolio" ? "white" : "#1a1a1a"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span style={{ fontSize: 17, fontWeight: 700, color: screen === "home" || screen === "portfolio" ? "white" : "#1a1a1a" }}>

          </span>
        </div>
      </div>

      <div style={{ overflowY: "auto", paddingBottom: 100 }}>

          <>
            <div style={{ background: "#00895E", padding: "0 20px 24px" }}>
              <div style={{ background: "white", borderRadius: 16, padding: "20px", textAlign: "center" }}>
                <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500, marginBottom: 4 }}>Total aset</div>
                <div style={{ fontSize: 28, fontWeight: 800, color: "#1a1a1a", marginBottom: 4 }}>{formatRp(totalAssets)}</div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>
                  Total keuntungan <span style={{ color: "#00895E" }}>{formatRp(totalProfit)}</span>
                </div>
                <button onClick={() => setScreen("portfolio")} style={{
                  marginTop: 16, width: "100%", padding: "12px", borderRadius: 10,
                  border: "1.5px solid #E5E7EB", background: "white", fontSize: 14,
                  fontWeight: 700, color: "#1a1a1a", cursor: "pointer", fontFamily: "'Nunito', sans-serif",
                }}>Lihat Semua Aset</button>
              </div>
            </div>

            <div style={{ padding: "20px 20px 0" }}>
              <div style={{ fontSize: 17, fontWeight: 800, color: "#1a1a1a", marginBottom: 16 }}>Investasi untuk Anda</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {catalogs.map((cat) => (
                  <button key={cat.id} onClick={() => { setSelectedCatalog(cat.id); setAmount(50000); setMode("autodebet"); setPeriod("monthly"); setConsent(false); setScreen("catalog"); }}

                ))}
              </div>
            </div>

                </div>
              </div>
            )}

                  <div style={{ fontSize: 15, fontWeight: 700, color: "#1a1a1a", marginBottom: 14 }}>Frekuensi penanaman</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    {[{ key: "weekly", label: "Mingguan", desc: "Setiap Senin" }, { key: "monthly", label: "Bulanan", desc: "Tanggal 1" }].map((opt) => (
                      <button key={opt.key} onClick={() => { setPeriod(opt.key); if (opt.key === "weekly") setAmount(10000); else setAmount(50000); }}

                        <div style={{ fontSize: 14, fontWeight: 700, color: period === opt.key ? "#7C3AED" : "#1a1a1a" }}>{opt.label}</div>

                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}
            <div style={{ padding: "16px 20px 0" }}>
              <div style={{ background: "white", borderRadius: 16, padding: "20px", border: "1.5px solid #F0F0F0" }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#1a1a1a", marginBottom: 4 }}>Nominal</div>
                {mode === "autodebet" && <div style={{ fontSize: 12, color: "#9CA3AF", fontWeight: 500, marginBottom: 12 }}>Jumlah yang ditanam otomatis per {periodLabel(period)}</div>}
                <div style={{ fontSize: 28, fontWeight: 800, color: amount > 0 ? "#1a1a1a" : "#D1D5DB", marginBottom: 14 }}>{formatRp(amount)}</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {(mode === "autodebet" ? (period === "weekly" ? [10000, 20000, 50000] : [50000, 100000, 200000]) : [50000, 100000, 500000, 1000000]).map((opt) => (
                    <button key={opt} onClick={() => setAmount(opt)} style={{ padding: "8px 14px", borderRadius: 10, border: amount === opt ? "2px solid #7C3AED" : "1.5px solid #E5E7EB", background: amount === opt ? "#F5F0FF" : "white", color: amount === opt ? "#7C3AED" : "#6B7280", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>{opt >= 1000000 ? `${opt / 1000000} jt` : `${(opt / 1000).toFixed(0)}rb`}</button>
                  ))}
                </div>
              </div>
            </div>
            <div style={{ padding: "16px 20px 0" }}>
              <div style={{ background: "white", borderRadius: 16, padding: "20px", border: "1.5px solid #F0F0F0" }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#1a1a1a", marginBottom: 4 }}>Keuntungan</div>
                <div style={{ fontSize: 17, fontWeight: 800, color: "#1a1a1a", marginBottom: 12 }}>{catalog.rate}% per tahun</div>
                <div style={{ borderTop: "1px solid #F0F0F0", paddingTop: 12, display: "flex", justifyContent: "space-between" }}>
                  <div><div style={{ fontSize: 12, color: "#6B7280", fontWeight: 500 }}>Jangka Waktu</div><div style={{ fontSize: 15, fontWeight: 700, color: "#1a1a1a" }}>{catalog.duration} bulan</div></div>
                  <div style={{ textAlign: "right" }}><div style={{ fontSize: 12, color: "#6B7280", fontWeight: 500 }}>{mode === "autodebet" ? "Estimasi/tahun" : "Estimasi"}</div><div style={{ fontSize: 15, fontWeight: 700, color: "#00895E" }}>{formatRp(mode === "autodebet" ? amount * periodsPerYear(period) * 0.05 : estimasi)}</div></div>
                </div>
              </div>
            </div>
            <div style={{ padding: "16px 20px 0" }}>
              <div style={{ background: "white", borderRadius: 16, padding: "20px", border: "1.5px solid #F0F0F0" }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#1a1a1a", marginBottom: 14 }}>Informasi</div>

                        <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 14 }}><span style={{ color: "#6B7280", fontWeight: 500 }}>{r.l}</span><span style={{ fontWeight: 700, color: r.c || "#1a1a1a" }}>{r.v}</span></div>
                      ))}
                      <div style={{ borderTop: "1px solid #E5E7EB", paddingTop: 10, display: "flex", justifyContent: "space-between", fontSize: 15 }}><span style={{ fontWeight: 800 }}>Total diterima</span><span style={{ fontWeight: 800, color: "#00895E" }}>{formatRp(asset.amount + asset.profit)}</span></div>
                    </div>
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => setDivestTarget(null)} style={{ flex: 1, padding: "14px", borderRadius: 14, border: "1.5px solid #E5E7EB", background: "white", fontSize: 15, fontWeight: 700, color: "#6B7280", cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>Batal</button>
                      <button onClick={() => setDivestTarget(null)} style={{ flex: 1, padding: "14px", borderRadius: 14, border: "none", background: "#DC2626", fontSize: 15, fontWeight: 700, color: "white", cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>Tarik {formatRp(asset.amount + asset.profit)}</button>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Edit autodebet modal */}
            {editAutodebet && (() => {
              const cat = catalogs.find(c => c.id === editAutodebet);
              return (
                <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100 }}>
                  <div style={{ width: "100%", maxWidth: 390, background: "white", borderRadius: "24px 24px 0 0", padding: "28px 24px 36px" }}>
                    <div style={{ width: 40, height: 4, borderRadius: 2, background: "#E5E7EB", margin: "0 auto 20px" }} />
                    <div style={{ fontSize: 18, fontWeight: 800, color: "#1a1a1a", marginBottom: 4 }}>Ubah Penanaman Otomatis</div>
                    <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500, marginBottom: 20 }}>{cat?.name}</div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 10 }}>Frekuensi</div>
                    <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
                      {[{ key: "weekly", label: "Mingguan" }, { key: "monthly", label: "Bulanan" }].map((opt) => (
                        <button key={opt.key} onClick={() => { setEditPeriod(opt.key); if (opt.key === "weekly") setEditAmount(10000); else setEditAmount(50000); }}
                          style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: editPeriod === opt.key ? "2px solid #7C3AED" : "1.5px solid #E5E7EB", background: editPeriod === opt.key ? "#F5F0FF" : "white", color: editPeriod === opt.key ? "#7C3AED" : "#6B7280", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>{opt.label}</button>
                      ))}
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 10 }}>Nominal per {periodLabel(editPeriod)}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
                      {(editPeriod === "weekly" ? [5000, 10000, 20000, 50000] : [50000, 100000, 200000, 500000]).map((opt) => (
                        <button key={opt} onClick={() => setEditAmount(opt)} style={{ padding: "10px 18px", borderRadius: 12, border: editAmount === opt ? "2px solid #7C3AED" : "1.5px solid #E5E7EB", background: editAmount === opt ? "#F5F0FF" : "white", color: editAmount === opt ? "#7C3AED" : "#6B7280", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>{formatRp(opt)}</button>
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => setEditAutodebet(null)} style={{ flex: 1, padding: "14px", borderRadius: 14, border: "1.5px solid #E5E7EB", background: "white", fontSize: 15, fontWeight: 700, color: "#6B7280", cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>Batal</button>
                      <button onClick={() => { updateAutoDebet(editAutodebet, editAmount, editPeriod); setEditAutodebet(null); }} style={{ flex: 1, padding: "14px", borderRadius: 14, border: "none", background: "linear-gradient(135deg, #7C3AED, #6D28D9)", fontSize: 15, fontWeight: 700, color: "white", cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>Simpan</button>
                    </div>
                  </div>
                </div>
              );
            })()}
          </>
        )}
      </div>

      {/* Sticky CTAs */}
      {screen === "catalog" && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 390, padding: "12px 20px 28px", background: "linear-gradient(0deg, #F5F5F5 70%, transparent 100%)" }}>
          <button onClick={() => { if (mode === "autodebet") setScreen("autodebet-setup"); else setScreen("confirm"); }} disabled={amount === 0}
            style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: amount > 0 ? "linear-gradient(135deg, #7C3AED, #6D28D9)" : "#E5E7EB", color: "white", fontSize: 16, fontWeight: 800, fontFamily: "'Nunito', sans-serif", cursor: amount > 0 ? "pointer" : "not-allowed", boxShadow: amount > 0 ? "0 4px 14px rgba(124,58,237,0.3)" : "none" }}>Lanjutkan</button>
        </div>
      )}
      {screen === "autodebet-setup" && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 390, padding: "12px 20px 28px", background: "linear-gradient(0deg, #F5F5F5 70%, transparent 100%)" }}>
          <button onClick={() => setScreen("confirm")} disabled={!consent}
            style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: consent ? "linear-gradient(135deg, #7C3AED, #6D28D9)" : "#E5E7EB", color: "white", fontSize: 16, fontWeight: 800, fontFamily: "'Nunito', sans-serif", cursor: consent ? "pointer" : "not-allowed", boxShadow: consent ? "0 4px 14px rgba(124,58,237,0.3)" : "none" }}>Lanjutkan</button>
        </div>
      )}
      {screen === "confirm" && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 390, padding: "0 20px 28px", background: "linear-gradient(0deg, #F5F5F5 80%, transparent 100%)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 28, height: 28, borderRadius: 8, background: "#F3E8FF", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>{"\u{1F4B3}"}</div><div><div style={{ fontSize: 14, fontWeight: 700, color: "#1a1a1a" }}>Poket</div><div style={{ fontSize: 12, color: "#6B7280", fontWeight: 500 }}>{formatRp(poketBalance)}</div></div></div>
            <span style={{ fontSize: 13, fontWeight: 700, color: "#7C3AED", cursor: "pointer" }}>Ubah</span>
          </div>
          <button onClick={() => setScreen("success")} style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: "linear-gradient(135deg, #7C3AED, #6D28D9)", color: "white", fontSize: 16, fontWeight: 800, fontFamily: "'Nunito', sans-serif", cursor: "pointer", boxShadow: "0 4px 14px rgba(124,58,237,0.3)" }}>{mode === "autodebet" ? `Aktifkan \u00B7 ${formatRp(amount)}${periodLabelPer(period)}` : `Bayar \u00B7 ${formatRp(amount)}`}</button>
        </div>
      )}
      {screen === "success" && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 390, padding: "12px 20px 28px", background: "linear-gradient(0deg, #F5F5F5 70%, transparent 100%)" }}>
          <button onClick={() => { setScreen("home"); setSelectedCatalog(null); }} style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: "linear-gradient(135deg, #7C3AED, #6D28D9)", color: "white", fontSize: 16, fontWeight: 800, fontFamily: "'Nunito', sans-serif", cursor: "pointer", boxShadow: "0 4px 14px rgba(124,58,237,0.3)" }}>Kembali ke Celengan</button>
        </div>
      )}
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById("root")).render(<CelenganAutodebet />);
  </script>
</body>
</html>
